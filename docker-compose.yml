services:

  mysql:
    image: mysql:8
    container_name: job-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: job_app
      MYSQL_USER: appuser
      MYSQL_PASSWORD: app123
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    build: .
    container_name: job-backend
    restart: always
    depends_on:
      - mysql
    env_file:
      - .env
    ports:
      - "5000:5000"

volumes:
  mysql-data:
